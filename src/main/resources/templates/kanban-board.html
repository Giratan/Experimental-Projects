<!DOCTYPE html>
<html lang="ru" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kanban Board</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="/css/kanban.css">
</head>
<body>
    <div class="container-fluid">
        <!-- Header -->
        <header class="bg-primary text-white p-3 mb-4">
            <div class="d-flex justify-content-between align-items-center">
                <h1 class="h3 mb-0">Kanban Board</h1>
                <div>
                    <span th:if="${currentUser}" th:text="${currentUser.fullName}" class="me-3"></span>
                    <span th:if="${currentUser}" th:text="'(' + ${currentUser.role.name()} + ')'" class="me-3"></span>
                    <a th:if="${currentUser}" href="/logout" class="btn btn-light btn-sm">Выйти</a>
                    <a th:unless="${currentUser}" href="/login" class="btn btn-light btn-sm">Войти</a>
                    <a th:if="${currentUser != null and currentUser.role.name() == 'ADMIN'}" href="/admin" class="btn btn-warning btn-sm ms-2">Админ панель</a>
                </div>
            </div>
        </header>

        <!-- Kanban Board -->
        <div class="kanban-board">
            <div class="row g-2">
                <div th:each="day : ${days}" class="col">
                    <div class="day-column">
                        <div class="day-header" th:with="dayTasks=${tasksByDay[day]}">
                            <h5 th:text="${#strings.capitalize(day.toString().toLowerCase())}">Понедельник</h5>
                            <span class="badge bg-secondary" th:text="${dayTasks != null ? #lists.size(dayTasks) : 0}">0</span>
                        </div>
                        <div class="tasks-container" th:data-day="${day}">
                            <div th:with="dayTasks=${tasksByDay[day]}" th:each="task : ${dayTasks}" 
                                 class="task-card" 
                                 th:data-task-id="${task.id}"
                                 th:classappend="${task.getColorClass()}">
                                <div class="task-header">
                                    <h6 th:text="${task.title}" class="task-title">Название задачи</h6>
                                    <span th:if="${task.assignedUser}" 
                                          th:text="${task.assignedUser.login}" 
                                          class="assigned-user"></span>
                                </div>
                                <div th:if="${task.description}" 
                                     th:text="${#strings.abbreviate(task.description, 50)}" 
                                     class="task-description"></div>
                                <div class="task-footer">
                                    <small th:if="${task.deadline}" 
                                           th:text="${#temporals.format(task.deadline, 'HH:mm')}" 
                                           class="deadline"></small>
                                    <span th:text="${task.status}" 
                                          class="badge status-badge"></span>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <!-- Task Modal -->
        <div class="modal fade" id="taskModal" tabindex="-1">
            <div class="modal-dialog">
                <div class="modal-content">
                    <div class="modal-header">
                        <h5 class="modal-title">Детали задачи</h5>
                        <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                    </div>
                    <div class="modal-body">
                        <form id="taskForm">
                            <input type="hidden" id="taskId">
                            <div class="mb-3">
                                <label for="taskTitle" class="form-label">Название</label>
                                <input type="text" class="form-control" id="taskTitle" required>
                            </div>
                            <div class="mb-3">
                                <label for="taskDescription" class="form-label">Описание</label>
                                <textarea class="form-control" id="taskDescription" rows="3"></textarea>
                            </div>
                            <div class="mb-3">
                                <label for="taskDay" class="form-label">День недели</label>
                                <select class="form-select" id="taskDay">
                                    <option th:each="day : ${days}" 
                                            th:value="${day}" 
                                            th:text="${#strings.capitalize(day.toString().toLowerCase())}"></option>
                                </select>
                            </div>
                            <div class="mb-3">
                                <label for="taskDeadline" class="form-label">Дедлайн</label>
                                <input type="datetime-local" class="form-control" id="taskDeadline">
                            </div>
                            <div class="mb-3">
                                <label for="taskUser" class="form-label">Исполнитель</label>
                                <select class="form-select" id="taskUser">
                                    <option value="">Не назначен</option>
                                    <option th:each="user : ${users}" 
                                            th:value="${user.id}" 
                                            th:text="${user.login}"></option>
                                </select>
                            </div>
                        </form>
                    </div>
                    <div class="modal-footer">
                        <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Отмена</button>
                        <button type="button" class="btn btn-primary" id="saveTask">Сохранить</button>
                        <button type="button" class="btn btn-success d-none" id="completeTask">Выполнить</button>
                        <button type="button" class="btn btn-danger d-none" id="deleteTask">Удалить</button>
                    </div>
                </div>
            </div>
        </div>

        <!-- Add Task Button (for Admin) -->
        <div th:if="${currentUser != null and currentUser.role.name() == 'ADMIN'}" class="fixed-bottom m-3">
            <button type="button" class="btn btn-primary btn-lg rounded-circle" data-bs-toggle="modal" data-bs-target="#taskModal" onclick="openNewTaskModal()">
                <i class="bi bi-plus"></i> +
            </button>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="/js/kanban.js"></script>
</body>
</html>
